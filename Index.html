<h1>🌊 First Time I Saw the Sea</h1>

<p>
The first time I saw the sea,  
my heart became quiet.  
The waves were moving,  
but my thoughts were still.  

In that moment,  
I felt like my love and my pain  
were lost somewhere in the waves.
</p>
